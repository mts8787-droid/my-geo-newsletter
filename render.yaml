services:
  - type: web
    name: geo-newsletter
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    disk:
      name: geo-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
